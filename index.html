<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>ASV Study Bible</title>
  <style>
    :root { color-scheme: dark; --bg:#07101f; --panel:#101b2e; --panel2:#0b1424; --text:#edf4ff; --muted:#9fb1cc; --line:rgba(255,255,255,.14); --accent:#ffd166; --accent2:#73d2ff; --linked:rgba(255,209,102,.24); }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif} body{display:flex;flex-direction:column}
    header{position:sticky;top:0;z-index:10;background:rgba(7,16,31,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:10px 12px;display:grid;gap:8px}
    h1{margin:0;font-size:18px}.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}input,select,button{border:1px solid var(--line);background:#17243a;color:var(--text);border-radius:12px;padding:10px;font-weight:650}input{min-width:150px;flex:1}select{max-width:100%;}button:active{transform:translateY(1px)}.note{color:var(--muted);font-size:12px;line-height:1.35}
    main{flex:1;display:grid;grid-template-rows:1fr 1fr;min-height:calc(100vh - 170px)}section{overflow:auto;padding:18px 16px 90px}section+section{border-top:2px solid var(--line);background:var(--panel2)}.section-title{color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:11px;margin:0 0 12px}.ref{color:var(--accent2);font-weight:750;margin-bottom:10px}.verse{font-size:clamp(21px,4.8vw,34px);line-height:1.9}.original .verse{font-size:clamp(18px,4.7vw,30px)}.hebrew{direction:rtl;text-align:right;font-family:"SBL Hebrew","Ezra SIL","Times New Roman",serif}.greek{font-family:"SBL Greek","Times New Roman",serif}.w{display:inline-block;margin:.08em .08em;padding:.02em .16em;border-radius:.32em;cursor:pointer;transition:background .12s,box-shadow .12s,color .12s}.w:hover{background:rgba(115,210,255,.16)}.w.active{background:var(--accent);color:#1b1400;box-shadow:0 0 0 3px rgba(255,209,102,.22)}.w.linked{background:var(--linked)}.gloss{position:fixed;left:12px;right:12px;bottom:12px;z-index:20;background:rgba(16,27,46,.96);border:1px solid var(--line);border-radius:18px;padding:12px 14px;box-shadow:0 12px 40px rgba(0,0,0,.35);display:none}.gloss.show{display:block}.gloss b{color:var(--accent)}.small{color:var(--muted);font-size:12px;margin-top:4px}.results{max-height:28vh;overflow:auto;border-top:1px solid var(--line);padding-top:6px;display:none}.result{display:block;width:100%;text-align:left;margin:4px 0;background:#101b2e;color:var(--text);font-weight:500}.result b{color:var(--accent2)}
    @media(min-width:900px){main{grid-template-columns:1fr 1fr;grid-template-rows:1fr}section+section{border-top:0;border-left:2px solid var(--line)}}
  </style>
</head>
<body>
<header>
  <h1>ASV Study Bible</h1>
  <div class="bar"><select id="bookSelect"></select><select id="chapterSelect"></select><select id="verseSelect"></select></div>
  <div class="bar"><input id="refInput" value="Genesis 1:1" placeholder="Reference, e.g. John 3:16 or Psalm 23"><button id="loadBtn">Go</button></div>
  <div class="bar"><input id="searchInput" placeholder="Search all ASV verses"><button id="searchBtn">Search</button><button id="clearBtn">Clear</button></div>
  <div id="results" class="results"></div>
  <div class="note">Top: ASV English. Bottom: linked Strong’s numbers for the verse; Genesis 1:1 and John 1:1 also include demo Hebrew/Greek alignment.</div><div id="status" class="note">Loading ASV data…</div>
</header>
<main><section class="english"><div class="section-title">ASV English</div><div id="engRef" class="ref"></div><div id="english" class="verse"></div></section><section class="original"><div class="section-title">Original language / lexical links</div><div id="origRef" class="ref"></div><div id="original" class="verse"></div></section></main><div id="gloss" class="gloss"></div>
<script>
window.onerror=(m,s,l)=>{document.getElementById('status').textContent='JavaScript error: '+m+' at line '+l};
const $=id=>document.getElementById(id); let ASV=[], byRef=new Map(), current=null, originalIndex=new Map(), originalCache={};
const aligned={
 'Genesis 1:1':{ref:'Genesis 1:1',lang:'hebrew',english:[['e1','In'],['e2','the beginning'],['e3','God'],['e4','created'],['e5','the heavens'],['e6','and'],['e7','the earth.']],original:[['h1','בְּרֵאשִׁית','bereshit — in beginning'],['h2','בָּרָא','bara — he created'],['h3','אֱלֹהִים','elohim — God'],['h4','אֵת','et — object marker'],['h5','הַשָּׁמַיִם','hashamayim — the heavens'],['h6','וְאֵת','ve-et — and object marker'],['h7','הָאָרֶץ','ha-aretz — the earth']],links:{e1:['h1'],e2:['h1'],e3:['h3'],e4:['h2'],e5:['h5'],e6:['h6'],e7:['h7'],h1:['e1','e2'],h2:['e4'],h3:['e3'],h4:[],h5:['e5'],h6:['e6'],h7:['e7']},note:'Demo Hebrew alignment.'},
 'John 1:1':{ref:'John 1:1',lang:'greek',english:[['e1','In'],['e2','the beginning'],['e3','was'],['e4','the Word,'],['e5','and'],['e6','the Word'],['e7','was'],['e8','with God,'],['e9','and'],['e10','the Word'],['e11','was God.']],original:[['g1','Ἐν','en — in'],['g2','ἀρχῇ','archē — beginning'],['g3','ἦν','ēn — was'],['g4','ὁ','ho — the'],['g5','Λόγος','logos — word'],['g6','καὶ','kai — and'],['g7','ὁ','ho — the'],['g8','Λόγος','logos — word'],['g9','ἦν','ēn — was'],['g10','πρὸς','pros — with/toward'],['g11','τὸν','ton — the'],['g12','Θεόν','theon — God'],['g13','καὶ','kai — and'],['g14','Θεὸς','theos — God'],['g15','ἦν','ēn — was'],['g16','ὁ','ho — the'],['g17','Λόγος','logos — word']],links:{e1:['g1'],e2:['g2'],e3:['g3'],e4:['g4','g5'],e5:['g6'],e6:['g7','g8'],e7:['g9'],e8:['g10','g11','g12'],e9:['g13'],e10:['g16','g17'],e11:['g14','g15'],g1:['e1'],g2:['e2'],g3:['e3'],g4:['e4'],g5:['e4'],g6:['e5'],g7:['e6'],g8:['e6'],g9:['e7'],g10:['e8'],g11:['e8'],g12:['e8'],g13:['e9'],g14:['e11'],g15:['e11'],g16:['e10'],g17:['e10']},note:'Demo Greek alignment.'}
};
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function normRef(s){return s.trim().replace(/\s+/g,' ').replace(/\s*:\s*/g,':').replace(/^(\d)\s+/, '$1 ')}
function isOT(v){return v.b<=39}
function verseToPassage(v){if(aligned[v.ref]) return aligned[v.ref]; const words=(v.text.match(/\S+/g)||[]); const english=[], original=[], links={}; const n=Math.max(words.length,v.strongs.length); for(let i=0;i<words.length;i++) english.push(['e'+i,words[i]]); for(let i=0;i<v.strongs.length;i++){const prefix=isOT(v)?'H':'G', oid='s'+i, eid='e'+Math.min(i,Math.max(0,words.length-1)); original.push([oid,prefix+v.strongs[i],prefix+v.strongs[i]+' Strong’s lexical number']); links[eid]=(links[eid]||[]).concat(oid); links[oid]=[eid];} if(!original.length) original.push(['s0','No Strong’s numbers available for this verse.','']); return {ref:v.ref,lang:isOT(v)?'hebrew':'greek',english,original,links,note:'ASV public-domain text with linked Strong’s lexical numbers. Full Hebrew/Greek word forms need a separate aligned source.'}}
function render(p){$('gloss').classList.remove('show'); current=p; $('engRef').textContent=p.ref; $('origRef').textContent=p.ref+' · '+(p.lang==='hebrew'?'Hebrew/OT':'Greek/NT'); $('original').className='verse '+(p.lang==='hebrew'?'hebrew':'greek'); $('english').innerHTML=p.english.map(([id,t])=>`<span class="w" data-id="${esc(id)}">${esc(t)}</span>`).join(' '); $('original').innerHTML=p.original.map(([id,t,g])=>`<span class="w" data-id="${esc(id)}" data-gloss="${esc(g||'')}">${esc(t)}</span>`).join(' '); document.querySelectorAll('.w').forEach(el=>el.onclick=()=>selectWord(el.dataset.id));}
function byId(id){return document.querySelector('[data-id="'+String(id).replace(/"/g,'\\"')+'"]')}
function selectWord(id){const p=current, linked=new Set([id,...((p.links&&p.links[id])||[])]); for(const [k,a] of Object.entries(p.links||{})) if(a.includes(id)) linked.add(k); document.querySelectorAll('.w').forEach(el=>{el.classList.toggle('active',el.dataset.id===id);el.classList.toggle('linked',linked.has(el.dataset.id)&&el.dataset.id!==id)}); const el=byId(id), mates=[...linked].filter(x=>x!==id).map(x=>byId(x)?.textContent).filter(Boolean).join(', '); $('gloss').innerHTML=`<b>${esc(el?.textContent||id)}</b>${el?.dataset.gloss?`<div>${esc(el.dataset.gloss)}</div>`:''}<div class="small">Linked: ${esc(mates||'none')}</div><div class="small">${esc(p.note||'')}</div>`; $('gloss').classList.add('show')}
function slugBook(book){return book.toLowerCase().replace(/ /g,'-')}
async function loadOriginalBook(book){if(originalCache[book]) return originalCache[book]; const meta=originalIndex.get(book); if(!meta) return null; const res=await fetch('data/'+meta.file+'?v=macula1'); if(!res.ok) throw new Error(res.status+' '+res.statusText); const data=await res.json(); originalCache[book]=data; return data;}
async function go(ref, sync=true){ref=normRef(ref); const v=byRef.get(ref.toLowerCase()); if(!v){$('status').textContent='Reference not found: '+ref; return;} $('refInput').value=v.ref; if(sync) syncSelectors(v); render(verseToPassage(v,null)); $('status').textContent='Loading original-language data for '+v.ref+'?'; try{const bookData=await loadOriginalBook(v.book); const maculaWords=bookData&&bookData.verses[`${v.c}:${v.v}`]; render(verseToPassage(v,maculaWords)); $('status').textContent='Showing '+v.ref+(maculaWords?' with MACULA original-language words.':' without MACULA original-language words.');}catch(err){$('status').textContent='Showing '+v.ref+'; original-language load failed: '+err.message;}}
function populateSelectors(){const books=[]; const seen=new Set(); for(const v of ASV){ if(!seen.has(v.book)){seen.add(v.book); books.push(v.book);} } $('bookSelect').innerHTML=books.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join(''); $('bookSelect').onchange=()=>{populateChapters($('bookSelect').value);}; $('chapterSelect').onchange=()=>{populateVerses($('bookSelect').value, +$('chapterSelect').value);}; $('verseSelect').onchange=()=>go(`${$('bookSelect').value} ${$('chapterSelect').value}:${$('verseSelect').value}`, false); populateChapters('Genesis');}
function populateChapters(book){const chapters=[...new Set(ASV.filter(v=>v.book===book).map(v=>v.c))]; $('chapterSelect').innerHTML=chapters.map(c=>`<option value="${c}">Chapter ${c}</option>`).join(''); populateVerses(book, chapters[0]);}
function populateVerses(book, chapter){const verses=ASV.filter(v=>v.book===book && v.c===chapter).map(v=>v.v); $('verseSelect').innerHTML=verses.map(v=>`<option value="${v}">Verse ${v}</option>`).join(''); if(verses.length) go(`${book} ${chapter}:${verses[0]}`, false);}
function syncSelectors(v){ if(!$('bookSelect').options.length) return; $('bookSelect').value=v.book; const currentChapter=$('chapterSelect').value; populateChapters(v.book); $('chapterSelect').value=String(v.c); populateVerses(v.book, v.c); $('verseSelect').value=String(v.v);}
function search(){const q=$('searchInput').value.trim().toLowerCase(), box=$('results'); if(!q){box.style.display='none'; return;} const hits=ASV.filter(v=>v.text.toLowerCase().includes(q)||v.ref.toLowerCase().includes(q)).slice(0,100); box.innerHTML=hits.map(v=>`<button class="result" data-ref="${esc(v.ref)}"><b>${esc(v.ref)}</b> ${esc(v.text.slice(0,180))}</button>`).join('') || '<div class="note">No results.</div>'; box.style.display='block'; box.querySelectorAll('button').forEach(b=>b.onclick=()=>{box.style.display='none'; go(b.dataset.ref)}); $('status').textContent=`${hits.length}${hits.length===100?'+':''} result(s) for “${q}”.`;}
async function init(){const [asvRes,origRes]=await Promise.all([fetch('data/asv.json?v=1'),fetch('data/original-index.json?v=macula1')]); if(!asvRes.ok) throw new Error(asvRes.status+' '+asvRes.statusText); const data=await asvRes.json(); ASV=data.verses; byRef=new Map(ASV.map(v=>[v.ref.toLowerCase(),v])); if(origRes.ok){const idx=await origRes.json(); originalIndex=new Map(idx.map(x=>[x.book,x]));} populateSelectors(); $('status').textContent='Loaded '+ASV.length.toLocaleString()+' ASV verses.'; go('Genesis 1:1');}
$('loadBtn').onclick=()=>go($('refInput').value); $('refInput').addEventListener('keydown',e=>{if(e.key==='Enter')go($('refInput').value)}); $('searchBtn').onclick=search; $('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')search()}); $('clearBtn').onclick=()=>{$('searchInput').value='';$('results').style.display='none'}; init().catch(err=>$('status').textContent='Load failed: '+err.message);
</script>
</body>
</html>
