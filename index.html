<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>ASV Original Language Study Bible</title>
  <style>
    :root { color-scheme: dark; --bg:#07101f; --panel:#101b2e; --panel2:#0b1424; --text:#edf4ff; --muted:#9fb1cc; --line:rgba(255,255,255,.14); --accent:#ffd166; --accent2:#73d2ff; --linked:rgba(255,209,102,.24); }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif} body{display:flex;flex-direction:column}
    header{position:sticky;top:0;z-index:10;background:rgba(7,16,31,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:10px 12px;display:grid;gap:8px}
    h1{margin:0;font-size:18px}.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}input,select,button{border:1px solid var(--line);background:#17243a;color:var(--text);border-radius:12px;padding:10px;font-weight:650}input{min-width:150px;flex:1}.note{color:var(--muted);font-size:12px;line-height:1.35}
    main{flex:1;display:grid;grid-template-rows:1fr 1fr;min-height:calc(100vh - 132px)}section{overflow:auto;padding:18px 16px 90px}section+section{border-top:2px solid var(--line);background:var(--panel2)}.section-title{color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:11px;margin:0 0 12px}.ref{color:var(--accent2);font-weight:750;margin-bottom:10px}.verse{font-size:clamp(21px,4.8vw,34px);line-height:1.9}.original .verse{font-size:clamp(24px,6vw,40px)}.hebrew{direction:rtl;text-align:right;font-family:"SBL Hebrew","Ezra SIL","Times New Roman",serif}.greek{font-family:"SBL Greek","Times New Roman",serif}.w{display:inline-block;margin:.08em .08em;padding:.02em .16em;border-radius:.32em;cursor:pointer;transition:background .12s,box-shadow .12s,color .12s}.w:hover{background:rgba(115,210,255,.16)}.w.active{background:var(--accent);color:#1b1400;box-shadow:0 0 0 3px rgba(255,209,102,.22)}.w.linked{background:var(--linked)}.gloss{position:fixed;left:12px;right:12px;bottom:12px;z-index:20;background:rgba(16,27,46,.96);border:1px solid var(--line);border-radius:18px;padding:12px 14px;box-shadow:0 12px 40px rgba(0,0,0,.35);display:none}.gloss.show{display:block}.gloss b{color:var(--accent)}.small{color:var(--muted);font-size:12px;margin-top:4px}
    @media(min-width:900px){main{grid-template-columns:1fr 1fr;grid-template-rows:1fr}section+section{border-top:0;border-left:2px solid var(--line)}}
  </style>
</head>
<body>
<header>
  <h1>ASV Original Language Study Bible</h1>
  <div class="bar"><select id="quick"><option value="Genesis 1:1">Genesis 1:1</option><option value="John 1:1">John 1:1</option><option value="John 3:16">John 3:16</option><option value="Psalm 23">Psalm 23</option></select><input id="refInput" value="Genesis 1:1" placeholder="John 3:16 or Psalm 23"><button id="load">Load ASV</button></div>
  <div class="note">Top: ASV English. Bottom: Hebrew/Greek where aligned data is available. Tap words to highlight linked words in both halves.</div><div id="status" class="note">Ready.</div>
</header>
<main><section class="english"><div class="section-title">ASV English</div><div id="engRef" class="ref"></div><div id="english" class="verse"></div></section><section class="original"><div class="section-title">Original language</div><div id="origRef" class="ref"></div><div id="original" class="verse"></div></section></main><div id="gloss" class="gloss"></div>
<script>
window.onerror=(m,s,l)=>{document.getElementById('status').textContent='JavaScript error: '+m+' at line '+l};
const $=id=>document.getElementById(id);
const aligned={
 'Genesis 1:1':{ref:'Genesis 1:1',lang:'hebrew',english:[['e1','In'],['e2','the beginning'],['e3','God'],['e4','created'],['e5','the heavens'],['e6','and'],['e7','the earth.']],original:[['h1','בְּרֵאשִׁית','bereshit — in beginning'],['h2','בָּרָא','bara — he created'],['h3','אֱלֹהִים','elohim — God'],['h4','אֵת','et — object marker'],['h5','הַשָּׁמַיִם','hashamayim — the heavens'],['h6','וְאֵת','ve-et — and object marker'],['h7','הָאָרֶץ','ha-aretz — the earth']],links:{e1:['h1'],e2:['h1'],e3:['h3'],e4:['h2'],e5:['h5'],e6:['h6'],e7:['h7'],h1:['e1','e2'],h2:['e4'],h3:['e3'],h4:[],h5:['e5'],h6:['e6'],h7:['e7']}},
 'John 1:1':{ref:'John 1:1',lang:'greek',english:[['e1','In'],['e2','the beginning'],['e3','was'],['e4','the Word,'],['e5','and'],['e6','the Word'],['e7','was'],['e8','with God,'],['e9','and'],['e10','the Word'],['e11','was God.']],original:[['g1','Ἐν','en — in'],['g2','ἀρχῇ','archē — beginning'],['g3','ἦν','ēn — was'],['g4','ὁ','ho — the'],['g5','Λόγος','logos — word'],['g6','καὶ','kai — and'],['g7','ὁ','ho — the'],['g8','Λόγος','logos — word'],['g9','ἦν','ēn — was'],['g10','πρὸς','pros — with/toward'],['g11','τὸν','ton — the'],['g12','Θεόν','theon — God'],['g13','καὶ','kai — and'],['g14','Θεὸς','theos — God'],['g15','ἦν','ēn — was'],['g16','ὁ','ho — the'],['g17','Λόγος','logos — word']],links:{e1:['g1'],e2:['g2'],e3:['g3'],e4:['g4','g5'],e5:['g6'],e6:['g7','g8'],e7:['g9'],e8:['g10','g11','g12'],e9:['g13'],e10:['g16','g17'],e11:['g14','g15'],g1:['e1'],g2:['e2'],g3:['e3'],g4:['e4'],g5:['e4'],g6:['e5'],g7:['e6'],g8:['e6'],g9:['e7'],g10:['e8'],g11:['e8'],g12:['e8'],g13:['e9'],g14:['e11'],g15:['e11'],g16:['e10'],g17:['e10']}}
};
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function tokenizeText(ref,text){let i=0;return {ref,lang:isOT(ref)?'hebrew':'greek',english:text.split(/(\s+)/).filter(x=>x.trim()).map(t=>['e'+(++i),t]),original:[['o1','Original-language word alignment is not loaded for this passage.','Import/add aligned Hebrew or Greek data to enable word links here.']],links:{},note:'ASV loaded from bible-api.com; word alignment is available only where aligned data has been added.'}}
function isOT(ref){return !/^(Matthew|Mark|Luke|John|Acts|Romans|1 Corinthians|2 Corinthians|Galatians|Ephesians|Philippians|Colossians|1 Thessalonians|2 Thessalonians|1 Timothy|2 Timothy|Titus|Philemon|Hebrews|James|1 Peter|2 Peter|1 John|2 John|3 John|Jude|Revelation)\b/i.test(ref)}
function render(p){$('gloss').classList.remove('show');$('engRef').textContent=p.ref;$('origRef').textContent=p.ref+' · '+(p.lang==='hebrew'?'Hebrew':'Greek');$('original').className='verse '+(p.lang==='hebrew'?'hebrew':'greek');$('english').innerHTML=p.english.map(([id,t])=>`<span class="w" data-id="${esc(id)}">${esc(t)}</span>`).join(' ');$('original').innerHTML=p.original.map(([id,t,g])=>`<span class="w" data-id="${esc(id)}" data-gloss="${esc(g||'')}">${esc(t)}</span>`).join(' ');window.current=p;document.querySelectorAll('.w').forEach(el=>el.onclick=()=>selectWord(el.dataset.id));}
function byId(id){return document.querySelector('[data-id="'+String(id).replace(/"/g,'\\"')+'"]')}
function selectWord(id){const p=window.current, linked=new Set([id,...((p.links&&p.links[id])||[])]);for(const [k,a] of Object.entries(p.links||{}))if(a.includes(id))linked.add(k);document.querySelectorAll('.w').forEach(el=>{el.classList.toggle('active',el.dataset.id===id);el.classList.toggle('linked',linked.has(el.dataset.id)&&el.dataset.id!==id)});const el=byId(id), mates=[...linked].filter(x=>x!==id).map(x=>byId(x)?.textContent).filter(Boolean).join(', ');$('gloss').innerHTML=`<b>${esc(el?.textContent||id)}</b>${el?.dataset.gloss?`<div>${esc(el.dataset.gloss)}</div>`:''}<div class="small">Linked: ${esc(mates||'none yet')}</div><div class="small">${esc(p.note||'')}</div>`;$('gloss').classList.add('show')}
async function loadRef(ref){ref=ref.trim();$('status').textContent='Loading ASV '+ref+'…';if(aligned[ref]){render(aligned[ref]);$('status').textContent='Loaded aligned demo passage.';return}const url='https://bible-api.com/'+encodeURIComponent(ref)+'?translation=asv';const res=await fetch(url);if(!res.ok)throw new Error(res.status+' '+res.statusText);const data=await res.json();const text=(data.verses||[]).map(v=>(data.verses.length>1?v.verse+' ':'')+v.text.trim()).join(' ');render(tokenizeText(data.reference||ref,text));$('status').textContent='Loaded ASV. Original word alignment not yet available for this passage.'}
$('quick').onchange=e=>{$('refInput').value=e.target.value;loadRef(e.target.value).catch(err=>$('status').textContent='Load failed: '+err.message)};$('load').onclick=()=>loadRef($('refInput').value).catch(err=>$('status').textContent='Load failed: '+err.message);loadRef('Genesis 1:1');
</script>
</body>
</html>
